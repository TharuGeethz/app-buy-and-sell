<section class="listings-page">
  <div class="page-header">
    <h1>All Listings</h1>
    <p class="subtext">Browse available items and click a listing to view details.</p>
  </div>

  <div class="listings-grid">
    <a class="listing-card" *ngFor="let item of allListings" [routerLink]="['/listings', item.id]">
      <div class="card-left">
        <div class="title">{{ item.name }}</div>
        <div class="meta">ID: {{ item.id }}</div>
      </div>

      <div class="price">$ {{ item.price }}</div>
    </a>
  </div>

  <div class="empty" *ngIf="allListings.length === 0">
    No listings yet.
  </div>
</section>
