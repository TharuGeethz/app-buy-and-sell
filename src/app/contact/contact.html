<div id="form">

<div>
<label>Your Email:</label>
<input [(ngModel)]="email" type="text" id="email">

</div>

<div>
<label>Your Message:</label>
<input [(ngModel)]="message" type="text" id="message" placeholder="Type your message..">
</div>

<button (click)="sendMessage()">Send Message</button>
</div>
