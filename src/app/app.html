<header class="top-header">
  <div class="brand">
    <div class="logo" aria-hidden="true">BS</div>
    <div class="brand-text">
      <div class="title">Buy & Sell</div>
      <div class="subtitle">List • Browse • Sell</div>
    </div>
  </div>

  <div class="welcome" *ngIf="(auth.user$ | async) as user">
    Hi, <span class="name">{{ user?.displayName }}</span>
  </div>

  <div class="actions">
    <ng-container *ngIf="(auth.user$ | async); else loginBlock">
      <button class="btn btn-ghost" (click)="signOut()">Sign out</button>
    </ng-container>

    <ng-template #loginBlock>
      <button class="btn btn-primary" (click)="signIn()">Sign in</button>
    </ng-template>
  </div>
</header>

<main>
  <div *ngIf="(auth.user$ | async) as user">
    <app-nav-bar></app-nav-bar>
    <div class="router-outlet"> <router-outlet/></div>
  
  </div>

  <div *ngIf="!(auth.user$ | async) as user">
    <section class="hero">
      <div class="hero-content">
        <h1>Buy & Sell Faster</h1>
        <p>List items, chat, and sell in minutes.</p>
        <button (click)="signIn()">Sign In Now!</button>
      </div>
      <div class="bubbles"></div>
    </section>
  </div>
</main>
<footer *ngIf="(auth.user$ | async) as user">© 2026 Tharu</footer>
