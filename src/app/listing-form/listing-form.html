<h3>{{componentMessage}}</h3>

<div id="form">
    
<div>
    <label>Name:</label>
    <input type="text" [(ngModel)] = "name" placeholder="Enter name...">
</div>

<div>
    <label>description:</label>
    <input type="text" [(ngModel)] = "description" placeholder="Enter description...">
</div>

<div>
    <label>Price:</label>
    <input type="text" [(ngModel)] = "price" placeholder="Enter price... ">
</div>

<div>
    <label>Views:</label>
    <input type="text" readonly="true" [(ngModel)]="views"> 
</div>

<button (click)="onSubmit()">{{buttonMessage}}</button>
</div>
